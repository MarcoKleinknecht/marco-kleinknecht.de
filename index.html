<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M.Sc. Marco Kleinknecht</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%231A1A2E'/><text y='72' x='50' text-anchor='middle' font-size='60' font-family='sans-serif' fill='%232E86AB' font-weight='bold'>MK</text></svg>">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark:   #1A1A2E;
      --accent: #2E86AB;
      --muted:  #8896A5;
      --white:  #FFFFFF;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .accent-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent) 0%, #A23B72 100%);
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--white);
    }
    footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    footer a {
      color: var(--muted);
      text-decoration: none;
    }
    footer a:hover { color: var(--white); }
  </style>
</head>
<body>
  <div class="accent-bar"></div>
  <h1>Marco<br>Kleinknecht</h1>
  <footer>
    <a href="/impressum">Impressum</a>
  </footer>
</body>
</html>
